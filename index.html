<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>isabel.sd.ufersa.br</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
      background:linear-gradient(135deg,#fdf2f8,#ede9fe);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:750px;
      background:white;
      border-radius:24px;
      padding:35px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    h1{
      text-align:center;
      color:#7c3aed;
      margin-bottom:10px;
      font-size:32px;
    }

    .subtitle{
      text-align:center;
      color:#6b7280;
      margin-bottom:30px;
      font-size:15px;
    }

    .upload-box{
      background:#faf5ff;
      border:2px dashed #c084fc;
      border-radius:18px;
      padding:35px;
      text-align:center;
      transition:0.3s;
    }

    .upload-box:hover{
      background:#f3e8ff;
    }

    .upload-box h3{
      color:#6d28d9;
      margin-bottom:15px;
      font-size:22px;
    }

    input[type="file"]{
      margin-top:15px;
      width:100%;
      background:white;
      padding:12px;
      border-radius:10px;
      border:1px solid #ddd;
      cursor:pointer;
    }

    .file-name{
      margin-top:15px;
      color:#7c3aed;
      font-size:14px;
      font-weight:600;
    }

    .buttons{
      display:flex;
      gap:15px;
      margin-top:25px;
    }

    button{
      flex:1;
      padding:15px;
      border:none;
      border-radius:14px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .upload-btn{
      background:#7c3aed;
      color:white;
    }

    .upload-btn:hover{
      background:#6d28d9;
      transform:translateY(-2px);
    }

    .refresh-btn{
      background:#ec4899;
      color:white;
    }

    .refresh-btn:hover{
      background:#db2777;
      transform:translateY(-2px);
    }

    .status{
      margin-top:25px;
      text-align:center;
      font-weight:bold;
      font-size:15px;
    }

    .success{
      color:#16a34a;
    }

    .error{
      color:#dc2626;
    }

    .files-section{
      margin-top:40px;
    }

    .files-section h2{
      color:#7c3aed;
      margin-bottom:20px;
      text-align:center;
    }

    .file-item{
      background:#faf5ff;
      border:1px solid #e9d5ff;
      border-radius:18px;
      padding:20px;
      margin-bottom:20px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .file-item strong{
      color:#4c1d95;
      font-size:16px;
    }

    .file-item img{
      width:100%;
      max-width:350px;
      border-radius:14px;
      border:3px solid #c084fc;
    }

    .file-item a{
      text-decoration:none;
      background:#7c3aed;
      color:white;
      padding:12px;
      border-radius:12px;
      text-align:center;
      font-weight:bold;
      transition:0.3s;
    }

    .file-item a:hover{
      background:#6d28d9;
    }

    .empty{
      text-align:center;
      color:#6b7280;
      padding:20px;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Sistema Web AWS S3</h1>

  <p class="subtitle">
    Upload e Recuperação de Arquivos
  </p>

  <div class="upload-box">

    <h3>Selecione um Arquivo</h3>

    <input type="file" id="fileInput">

    <div class="file-name" id="fileName"></div>

  </div>

  <div class="buttons">

    <button
      class="upload-btn"
      onclick="uploadFile()">
      Enviar Arquivo
    </button>

    <button
      class="refresh-btn"
      onclick="loadFiles()">
      Atualizar Arquivos
    </button>

  </div>

  <div class="status" id="status"></div>

  <div class="files-section">

    <h2>Arquivos no Bucket</h2>

    <div id="filesList"></div>

  </div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const fileName =
document.getElementById("fileName");

const statusDiv =
document.getElementById("status");

const filesList =
document.getElementById("filesList");

const BUCKET_URL =
"https://isabel-sd-2026-1.s3.amazonaws.com/";

const apiURL =
"https://mf3xxdiuqc.execute-api.us-east-1.amazonaws.com/upload";

const arquivos = [];

fileInput.addEventListener("change", () => {

    if(fileInput.files.length > 0){

        fileName.innerHTML =
        "Arquivo selecionado: " +
        fileInput.files[0].name;
    }

});

async function uploadFile(){

    const file = fileInput.files[0];

    if(!file){

        statusDiv.innerHTML =
        "Selecione um arquivo.";

        statusDiv.className =
        "status error";

        return;
    }

    statusDiv.innerHTML =
    "Enviando arquivo...";

    statusDiv.className =
    "status";

    const reader = new FileReader();

    reader.onload = async function(event){

        const base64 =
        event.target.result.split(",")[1];

        try{

            const response = await fetch(apiURL, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    fileName: file.name,
                    content: base64
                })

            });

            const data =
            await response.json();

            statusDiv.innerHTML =
            "Arquivo enviado com sucesso!";

            statusDiv.className =
            "status success";

            arquivos.push(file.name);

            renderFiles();

            console.log(data);

        }

        catch(error){

            console.error(error);

            statusDiv.innerHTML =
            "Erro ao enviar arquivo.";

            statusDiv.className =
            "status error";
        }

    };

    reader.readAsDataURL(file);
}

function loadFiles(){

    renderFiles();
}

function renderFiles(){

    filesList.innerHTML = "";

    if(arquivos.length === 0){

        filesList.innerHTML =
        `<div class="empty">
            Nenhum arquivo carregado ainda.
         </div>`;

        return;
    }

    arquivos.forEach(nomeArquivo => {

        const fileURL =
        `${BUCKET_URL}${nomeArquivo}`;

        const div =
        document.createElement("div");

        div.className = "file-item";

        const isImage =
            nomeArquivo.endsWith(".png") ||
            nomeArquivo.endsWith(".jpg") ||
            nomeArquivo.endsWith(".jpeg") ||
            nomeArquivo.endsWith(".gif") ||
            nomeArquivo.endsWith(".webp");

        div.innerHTML = `

            <strong>${nomeArquivo}</strong>

            ${
                isImage
                ?

                `<img
                    src="${fileURL}"
                    alt="${nomeArquivo}"
                >`

                :

                `<p>Pré-visualização indisponível</p>`
            }

            <a
                href="${fileURL}"
                target="_blank"
            >
                Abrir / Download
            </a>

        `;

        filesList.appendChild(div);

    });

}

</script>

</body>

</html>
